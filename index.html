<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interview with Jane Austen</title>

<style>

body{
font-family:Georgia,serif;
background:linear-gradient(135deg,#e6d8c3,#bfa98a);
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

body{
font-family:Georgia,serif;

/* Romantic layered background */
background:
radial-gradient(circle at 20% 30%, rgba(255, 230, 230, 0.6), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255, 240, 220, 0.6), transparent 40%),
linear-gradient(135deg,#f5e6e8,#e8d5c4,#d6c0a8);

/* Optional subtle texture (very light) */
background-blend-mode: soft-light;

margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
  
.game{
width:600px;
background:#fffaf3;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

h2{
text-align:center;
margin-top:0;
}

.dialogue{
background:#f5efe5;
padding:15px;
border-radius:8px;
min-height:120px;
margin-bottom:20px;
}

button{
display:block;
width:100%;
margin:8px 0;
padding:10px;
border:none;
border-radius:6px;
background:#7b5e57;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#5e4742;
}

.restart{
background:#3a6ea5;
}

</style>
</head>

<body>

<div class="game">

<h2>🎙 Interview with Jane Austen</h2>

<div class="dialogue" id="text">
You find yourself in a quiet Regency drawing room.  
Before you sits the renowned novelist, Miss Jane Austen.
</div>

<div id="choices"></div>

</div>

<script>

const story = {

start:{
text:`"Pray, do sit down," says Jane Austen with a curious smile.
"What would you ask a humble novelist?"`,
choices:[
{label:"Ask about her writing",next:"writing"},
{label:"Ask about romance in society",next:"romance"},
{label:"Ask what she thinks of Bridgerton",next:"bridgerton_intro"}
]
},

writing:{
text:`"Writing is my chief delight," she says.
"Though the world believes ladies should concern themselves only with tea and marriage."`,
choices:[
{label:"Ask about Pride and Prejudice",next:"pride"},
{label:"Ask about modern TV adaptations",next:"bridgerton_intro"}
]
},

romance:{
text:`She raises an eyebrow.

"Society speaks endlessly of romance, yet it is character that determines happiness."`,
choices:[
{label:"Ask if love should defy class",next:"class"},
{label:"Ask about modern romantic dramas",next:"bridgerton_intro"}
]
},

pride:{
text:`"Miss Bennet and Mr Darcy have quite taken on a life of their own," she laughs.

"I merely observed the follies of society."`,
choices:[
{label:"Ask if she enjoys modern adaptations",next:"bridgerton_intro"},
{label:"End interview politely",next:"end_polite"}
]
},

class:{
text:`"To marry for affection is admirable," she says,
"but society is not always so accommodating."`,
choices:[
{label:"Mention Bridgerton",next:"bridgerton_intro"},
{label:"Thank her for her insight",next:"end_polite"}
]
},

bridgerton_intro:{
text:`You mention the popular series Bridgerton.

Miss Austen pauses thoughtfully.

"A drama of balls, gossip, and courtship, you say?"`,
choices:[
{label:"Tell her it captures Regency society well",next:"bridgerton_positive"},
{label:"Tell her it exaggerates drama and scandal",next:"bridgerton_critical"},
{label:"Ask if she would write for television",next:"bridgerton_writer"}
]
},

bridgerton_positive:{
text:`She smiles politely.

"If it encourages audiences to enjoy stories of society and courtship,
then I suppose it has its merit.

Though I confess my own style relies somewhat more upon irony."`,
choices:[
{label:"Ask if she would improve it",next:"bridgerton_writer"},
{label:"End the interview",next:"end_success"}
]
},

bridgerton_critical:{
text:`A mischievous spark appears in her eye.

"Exaggerated scandal? My dear interviewer,
society provides enough absurdity without embellishment."`,
choices:[
{label:"Ask what she would change",next:"bridgerton_writer"},
{label:"End interview laughing",next:"end_success"}
]
},

bridgerton_writer:{
text:`She considers carefully.

"If I were to write such a drama,
I would ensure wit and character triumph over spectacle.

A sharp conversation is often more powerful than a grand ball."`,
choices:[
{label:"Thank her for the interview",next:"end_success"}
]
},

end_polite:{
text:`You thank Jane Austen for her time.

She nods graciously.

"Conversation, like a good novel, must know when to conclude."`,
choices:[
{label:"Play again",next:"start"}
]
},

end_success:{
text:`Jane Austen smiles warmly.

"I believe our interview would make a most entertaining chapter indeed."

You leave the drawing room feeling rather accomplished.`,
choices:[
{label:"Interview again",next:"start"}
]
}

}

function render(node){

document.getElementById("text").innerText = story[node].text

const choicesDiv = document.getElementById("choices")
choicesDiv.innerHTML=""

story[node].choices.forEach(choice=>{

const btn = document.createElement("button")
btn.innerText = choice.label

btn.onclick = ()=>render(choice.next)

choicesDiv.appendChild(btn)

})

}

render("start")

</script>

</body>
</html>
